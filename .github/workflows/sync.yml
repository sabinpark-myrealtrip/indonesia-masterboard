name: Sync BQ data to Supabase

on:
  # GitHub 호스팅 러너는 redash.myrealtrip.net(내부망 전용, 10.30.x.x)에 접근할 수 없어
  # 정기 schedule 트리거는 100% 실패한다. 대신 로컬 launchd(scripts/sync-cron.sh)가
  # 하루 3번(09/13/18시 KST) 내부망에서 직접 sync를 실행한다. 이 workflow는 수동 실행용으로만 유지.
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync
        env:
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
